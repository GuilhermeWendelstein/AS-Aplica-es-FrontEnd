<div class="card" *ngIf="resultado">
  <h2>Resultado da triagem</h2>

  <div class="resumo-lista">
    <div class="resumo-item">
      <strong>Nível de risco:</strong>
      <span [ngClass]="resultado.nivel.toLowerCase()">
        {{ resultado.nivel }}
      </span>
    </div>

    <div class="resumo-item">
      <strong>Recomendação:</strong> {{ resultado.recomendacao }}
    </div>
  </div>

  <div class="acoes">
    <button type="button" (click)="novaConsulta()">
      Nova Consulta
    </button>
    <button type="button" class="secundario" (click)="voltarLogin()">
    Voltar para Login
  </button>
  </div>
</div>
