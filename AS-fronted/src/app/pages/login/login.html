<div class="login-shell">
  <div class="login-hero">
    <span>Triagem digital</span>
    <h1>MedForm</h1>
    <p>Entre para iniciar o formulário médico.</p>
  </div>

  <div class="login-card">
    <h2>Fazer Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <input type="email" formControlName="email" placeholder="E-mail" />

      <input type="password" formControlName="password" placeholder="Senha" />

      <button type="submit">Entrar</button>
    </form>

    <div class="login-links">
      <a routerLink="/cadastro">Não tem conta? Cadastre-se</a>
    </div>
  </div>
</div>
